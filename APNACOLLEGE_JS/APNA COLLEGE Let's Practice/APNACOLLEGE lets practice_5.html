<script>
    let gamenum=25;
    let guess=prompt("Enter a number:");
    while (guess!=gamenum){
        guess=prompt("you entered a wrong number please try again:");
    };
    console.log("Congratulations!");

    // important thing to note here:
    // that prompt always takes a string as a input so in above program we have written single equal not double equal with exclamation mark.
</script>

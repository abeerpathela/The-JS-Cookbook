<script>
    let marks=[85,97,44,37,76,60];
    let sum=0;
    let num=0;
    for(let i of marks){
        sum=sum+i;
        num=num+1
    }
    let average=sum/num;
    console.log("Average of the array of marks:",average);
</script>

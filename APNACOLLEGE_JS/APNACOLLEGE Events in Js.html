<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            border: 1px solid black;
            border-radius: 15px;
            background-color: black;
            color: white;
            width: 160px;
            height: 20px;
        }
    </style>
</head>
<body>
    <!-- single click button -->
    <button onclick="alert('i am single click button'); console.log('single click Button was clicked!!')">Click Me!</button>
    <br>
    <br>
    <!-- double click button -->
    <button ondblclick="alert('i am a double click button'); console.log('Double click button was clicked')">Click me two times</button>
    <br>
    <br>
    <!-- mouse over event on button -->
    <button onmouseover="alert('You are inside the div')">Hover on me!</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<script>
    // This is a comment.

    //Aritmetic operators
    let a=5;
    let b=2;
    console.log("a:",a,"b:",b);
    console.log("a+b:",a+b);
    console.log("a-b:",a-b);
    console.log("a*b:",a*b);
    console.log("a/b:",a/b);
    console.log("a%b:",a%b);
    console.log("a**b:",a**b);
    console.log(" ");

    // Unary Operator
    let c=5;
    let d=2;
    console.log("c:",c,"d:",d);
    c=c+1;
    console.log("c:",c);
    ++c;
    console.log("c:",c);
    d--;
    console.log("d:",d);

    // Comparison operator
    let e=5;
    let f=2;

    console.log("5==2:",e==f);
    console.log("5!=2",e!=f);

    // special case of javascript
    let g=5;
    let h="5";

    console.log("g==h",g==h);
    console.log("g===h",g===h);

    // logical operators
    let i=6;
    let j=5;

    let cond1= i>j; // false
    let cond4= i==6; // true
    let cond2= i===j;//false
    let cond3= i<j; //false

    console.log("condition 1 and condition 4 are getting both checked:",cond1 && cond4);
    console.log(cond4 || cond1);
    console.log(!cond4);
</script>

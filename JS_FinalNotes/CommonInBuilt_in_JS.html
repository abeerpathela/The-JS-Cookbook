<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Math Object
        console.log(Math.PI);
        console.log(Math.max(10,30,60));
        console.log(Math.min(10,30,60));
        console.log(Math.round(1.66));
        console.log(Math.floor(9.66));
        console.log(Math.ceil(9.66));    
        console.log(Math.abs(-5));
        console.log(Math.random()*10);
        console.log(Math.sqrt(4));
        console.log(Math.pow(3,2));
        console.log(Math.sin(45));
        console.log(Math.cos(45));
        console.log(Math.tan(45));

        // Date Object
        let current=new Date();
        console.log(current);
        let customDate=new Date('June 20 1988 07:15');
        console.log(customDate);
        let customDate_2=new Date(1988,5,20,7);
        console.log(customDate_2);

        console.log(customDate_2.getDay());
        console.log(customDate_2.getFullYear());
        customDate_2.setFullYear(2001);
        console.log(customDate_2);
    </script>
</body>
</html>

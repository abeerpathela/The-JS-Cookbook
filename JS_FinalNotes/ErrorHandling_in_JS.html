What is Error? 
Error is just a event which impacts or disrupts the normal flow of execution of code 
Types of Error?
1) Compile Time Error ->  the error of the code detected before the execution of the code " Code jab parse ho raha tha machine code mei tab hei error detect ho jata hai "
2) Run Time Error -> the error of the code detected while the code was executing 
Example of each type of error 
1) Compile Time Error -> Syntax Error 
2) Run Time Error -> Reference Error  
-->
